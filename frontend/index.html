<!DOCTYPE html>
<html>
<head>
<title>Placement Prediction</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background-color:green;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background-color:darkgreen;
}
</style>

</head>

<body>

<h2>Placement Readiness Prediction</h2>

<input type="number" id="skill" placeholder="Enter Skill Level">

<br>

<input type="number" id="cgpa" placeholder="Enter CGPA">

<br>

<button onclick="predict()">Predict</button>

<h3 id="result"></h3>

<script>

async function predict(){

let skill = document.getElementById("skill").value;
let cgpa = document.getElementById("cgpa").value;

try{

let response = await fetch(`http://localhost:8090/predict?skill=${skill}&cgpa=${cgpa}`);

let data = await response.text();

document.getElementById("result").innerText = data;

}
catch(error){

document.getElementById("result").innerText="Backend not reachable";

}

}

</script>

</body>
</html>
